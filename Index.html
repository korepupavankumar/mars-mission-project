<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Mars Mission</title>

    <link rel="stylesheet" href="style.css" />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap"
      rel="stylesheet"
    />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  </head>

  <body>
    <!-- LOADER -->
    <div class="loader">
      <h1>🚀 Launching Mission...</h1>
    </div>

    <!-- STARS -->
    <div class="stars"></div>

    <!-- HERO -->
    <section class="hero">
      <h1 class="title">Mars Mission Control 🚀</h1>
      <p class="subtitle">Launching mission to Mars...</p>
    </section>

    <!-- PARALLAX -->
    <section class="parallax">
      <div class="layer bg"></div>
      <div class="layer mid"></div>
      <div class="layer front"></div>
      <h2>Into Space 🌌</h2>
    </section>

    <!-- ROCKET JOURNEY -->
    <section class="journey">
      <h2 class="journey-title">Mission Journey 🚀</h2>

      <div class="scene">
        <div class="earth">🌍</div>
        <div class="rocket">🚀</div>
        <div class="mars">🔴</div>
      </div>
    </section>

    <!-- CARDS -->
    <section class="cards">
      <div class="card">Launch 🚀</div>
      <div class="card">Travel 🌌</div>
      <div class="card">Landing 🪐</div>
    </section>

    <!-- TIMELINE -->
    <section class="timeline">
      <div class="step">Earth 🌍</div>
      <div class="step">Orbit 🛰️</div>
      <div class="step">Mars 🔴</div>
    </section>

    <!-- END -->
    <section class="end">
      <h2>The Future is Mars 🚀</h2>
    </section>

    <script src="script.js"></script>
  </body>
</html>
